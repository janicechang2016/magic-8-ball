<style>
  :root{
    --bubble:#ff5fa6;
    --hot:#ff1f8f;
    --magenta:#e8008f;
    --baby:#ffd6ec;

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}

  #shake{
    font-size:21px;padding:15px 52px;text-transform:uppercase;
    background:linear-gradient(180deg, #ff8ec6 0%, var(--hot) 55%, var(--magenta) 100%);

  #motion{font-size:12px;padding:8px 18px;display:none;background:rgba(255,255,255,.22);border-width:2px;}

  /* ===== pasted stickers ===== */

    background:#fff8b0;color:var(--magenta);border:2px solid var(--magenta);border-radius:50%;

<body>
  <div id="masthead">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   MAGIC 8 — "the fate edit"   (Y2K / Mean Girls restyle)
   Single file, Three.js r128, fully procedural, PWA-ready.
   Form kept identical to spec: sphere + ONE round window
   (the window = the physical screen in iteration 3).
   Blocks: 1 answers · 2 scene · 3 lights · 4 shell · 5 window
           · 6 charms · 7 state · 8 motion · 9 loop · 10 resize · 11 pwa
   ============================================================ */

// ---- 1. ANSWERS --------------------------------------------
const ANSWERS = [
  "are you stupid","don't be embarrassing","it's literally not ok","yas queen",
  "yes but only because i'm in a good mood","the universe said no",
  "mercury is in retrograde, so...","obviously",
  "yes 💖 (don't tell anyone i said that)","fine. but you owe me.",
  "no, he is a dumbass","go kick rocks","pull the victim tampon out of your ass",
  "stfu","go write about it in your diary bitch",
  "ask again","fuck around and find out","do you enjoy being a clown?",
  "feminism died today","greyrock his ass girl"
];
const WAKE_LINES = ["consulting my extremely worn thin patience","fuck his ass up","remember, forgive but never forget :)"];

// ---- 2. SCENE ----------------------------------------------
const mount=document.getElementById('scene');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(38,1,0.1,100); camera.position.set(0,0,4);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
mount.appendChild(renderer.domElement);

// ---- 3. LIGHTS (multi-hue so the gloss reads candy/iridescent) ----
scene.add(new THREE.AmbientLight(0xffd6ec,0.7));
const key=new THREE.DirectionalLight(0xffffff,1.4); key.position.set(2.5,4,5); scene.add(key);
const p1=new THREE.PointLight(0xffffff,1.6,20); p1.position.set(-3,3,3); scene.add(p1);   // white gloss pip
const p2=new THREE.PointLight(0xc7a4ff,1.3,20); p2.position.set(3,-2,2); scene.add(p2);    // lilac
const p3=new THREE.PointLight(0xff1f8f,1.2,20); p3.position.set(0,2,-3); scene.add(p3);     // hot pink back

// ---- 4. SHELL (glossy bubblegum plastic) -------------------
const orb=new THREE.Group(); scene.add(orb);
orb.add(new THREE.Mesh(
  new THREE.SphereGeometry(1,72,72),
  new THREE.MeshPhysicalMaterial({ color:0xff4f9e, roughness:0.16, metalness:0.0,
    clearcoat:1.0, clearcoatRoughness:0.07, emissive:0x4a0026, emissiveIntensity:0.25 })
));

function canvasTex(size,draw){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const ctx=c.getContext('2d'); draw(ctx,size);
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return {tex:t,canvas:c,ctx};
}

// ---- 5. THE WINDOW (bedazzled round compact) ---------------
const eye=new THREE.Group(); eye.position.set(0,-0.02,1.01); orb.add(eye);

// 5a. glossy magenta glass
const glass=new THREE.Mesh(new THREE.CircleGeometry(0.5,72),
  new THREE.MeshBasicMaterial({ map:canvasTex(512,(ctx,s)=>{
    const r=s/2, g=ctx.createRadialGradient(r,r*0.8,8,r,r,r);
    g.addColorStop(0,'#ff8fc8');g.addColorStop(.45,'#c6007e');g.addColorStop(1,'#5e0038');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(r,r,r,0,7);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.30)';                    // gloss crescent
    ctx.beginPath();ctx.ellipse(r,r*0.55,r*0.6,r*0.28,0,0,7);ctx.fill();
  }).tex, transparent:true, depthWrite:false }));
eye.add(glass);

// 5b. idle "8" sticker
const idle=canvasTex(512,()=>{});
const idleMat=new THREE.MeshBasicMaterial({map:idle.tex,transparent:true,opacity:0,depthWrite:false});
const idlePlane=new THREE.Mesh(new THREE.PlaneGeometry(0.8,0.8),idleMat); idlePlane.position.z=0.02; eye.add(idlePlane);
function drawIdle(){
  const ctx=idle.ctx,s=512; ctx.clearRect(0,0,s,s);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`400 ${s*0.62}px Shrikhand, cursive`;
  ctx.lineWidth=22;ctx.lineJoin='round';ctx.strokeStyle='#fff';ctx.strokeText('8',s/2,s/2+s*0.04);
  ctx.fillStyle='#ffe34d';ctx.fillText('8',s/2,s/2+s*0.04);
  idle.tex.needsUpdate=true;
}

// 5c. answer plate (marker-sticker reveal)
const ans=canvasTex(768,()=>{});
const ansMat=new THREE.MeshBasicMaterial({map:ans.tex,transparent:true,opacity:0,depthWrite:false});
const ansPlane=new THREE.Mesh(new THREE.PlaneGeometry(0.82,0.82),ansMat); ansPlane.position.z=0.025; eye.add(ansPlane);
function wrap(t,m){const w=t.split(' ');let L=[],l='';for(const x of w){if((l+' '+x).trim().length>m){L.push(l.trim());l=x;}else l+=' '+x;}if(l.trim())L.push(l.trim());return L;}
function drawAnswer(text,blur){
  const ctx=ans.ctx,s=768; ctx.clearRect(0,0,s,s);
  ctx.save(); ctx.filter=blur>0.1?`blur(${blur}px)`:'none';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const lines=wrap(text,11); const fs=lines.length>3?78:96, lh=fs*1.12;
  ctx.font=`400 ${fs}px 'Permanent Marker', cursive`;
  const top=s/2-(lines.length-1)*lh/2;
  ctx.lineJoin='round';
  lines.forEach((ln,i)=>{ const y=top+i*lh;
    ctx.lineWidth=fs*0.34;ctx.strokeStyle='#fff';ctx.strokeText(ln,s/2,y);  // white sticker outline
    ctx.fillStyle='#ff1f8f';ctx.fillText(ln,s/2,y);                          // hot-pink fill
  });
  // sparkles
  ctx.fillStyle='#fff8b0';ctx.font=`400 ${fs*0.6}px 'Permanent Marker', cursive`;
  ctx.fillText('\u2738', s*0.16, s*0.2); ctx.fillText('\u2738', s*0.86, s*0.84);
  ctx.restore(); ans.tex.needsUpdate=true;
}

// 5d. rhinestone bezel (transparent center frames the glass)
const bezel = new THREE.Mesh(new THREE.CircleGeometry(0.66,72),
  new THREE.MeshBasicMaterial({ map:canvasTex(512,(ctx,s)=>{
    const r=s/2; ctx.clearRect(0,0,s,s);
    const ring=ctx.createRadialGradient(r,r,r*0.74,r,r,r*0.99);
    ring.addColorStop(0,'rgba(0,0,0,0)');ring.addColorStop(.18,'#ff7ab8');ring.addColorStop(.6,'#ffd0e8');ring.addColorStop(1,'#ff4f9e');
    ctx.fillStyle=ring;ctx.beginPath();ctx.arc(r,r,r,0,7);ctx.arc(r,r,r*0.76,0,7,true);ctx.fill();
    for(let i=0;i<26;i++){const a=i/26*7, rr=r*0.87;            // rhinestones
      const x=r+Math.cos(a)*rr,y=r+Math.sin(a)*rr;
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,r*0.028,0,7);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(x-2,y-2,r*0.013,0,7);ctx.fill();
    }
  }).tex, transparent:true, depthWrite:false }));
bezel.position.z = 0.03;
eye.add(bezel);

// ---- 6. FLOATING CHARMS (hearts / stars / sparkles) --------
const charms=new THREE.Group(); scene.add(charms);
function shape(kind,color){ return canvasTex(128,(ctx,s)=>{
  ctx.translate(s/2,s/2); ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=6; ctx.lineJoin='round';
  const R=s*0.36; ctx.beginPath();
  if(kind==='heart'){ctx.moveTo(0,R*0.5);ctx.bezierCurveTo(R*1.1,-R*0.5,R*0.5,-R*1.1,0,-R*0.35);ctx.bezierCurveTo(-R*0.5,-R*1.1,-R*1.1,-R*0.5,0,R*0.5);}
  else if(kind==='star'){for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2,rr=i%2?R*0.45:R;const x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();}
  else{for(let i=0;i<8;i++){const a=Math.PI/4*i,rr=i%2?R*0.22:R;const x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();}
  ctx.fill();ctx.stroke();
}).tex; }
const charmTex=[shape('heart','#ff3d9a'),shape('star','#ffe34d'),shape('star','#c7a4ff'),shape('sparkle','#ffffff'),shape('heart','#ff8ec6')];
for(let i=0;i<18;i++){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:charmTex[i%charmTex.length],transparent:true,depthWrite:false}));
  const rad=1.7+Math.random()*2.2, a=Math.random()*7, b=Math.acos(2*Math.random()-1);
  sp.userData={bx:rad*Math.sin(b)*Math.cos(a),by:rad*Math.sin(b)*Math.sin(a),bz:rad*Math.cos(b)*0.5,
    ph:Math.random()*7, spd:0.5+Math.random()*0.8, amp:0.1+Math.random()*0.15};
  sp.position.set(sp.userData.bx,sp.userData.by,sp.userData.bz);
  const sc=0.16+Math.random()*0.22; sp.scale.set(sc,sc,sc);
  charms.add(sp);
}

// ---- 7. STATE MACHINE --------------------------------------
const S={IDLE:0,WAKING:1,REVEAL:2}; let state=S.IDLE, t0=0, spin={x:0,y:0}, pending='', asked=false;
const WAKE_MS=800, REVEAL_MS=820; const hint=document.getElementById('hint');
function ask(){
  if(state===S.WAKING) return;
  state=S.WAKING; t0=performance.now(); asked=true;
  pending=ANSWERS[Math.floor(Math.random()*ANSWERS.length)];
  spin.x=(Math.random()*2-1)*0.5; spin.y=(Math.random()*2-1)*0.5;
  ansMat.opacity=0;
  hint.textContent=WAKE_LINES[Math.floor(Math.random()*WAKE_LINES.length)];
  if(navigator.vibrate) navigator.vibrate(30);
}
document.getElementById('shake').addEventListener('click',ask);
renderer.domElement.addEventListener('pointerdown',ask);

// ---- 8. DEVICE MOTION --------------------------------------
const THRESH=18; let lastShake=0;
function onMotion(e){const a=e.accelerationIncludingGravity;if(!a||a.x==null)return;
  const m=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z),now=performance.now();
  if(m>THRESH&&now-lastShake>1200){lastShake=now;ask();}}
if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
  const mb=document.getElementById('motion');mb.style.display='block';
  mb.addEventListener('click',async()=>{try{if(await DeviceMotionEvent.requestPermission()==='granted'){window.addEventListener('devicemotion',onMotion);mb.style.display='none';}}catch(_){}});
}else if(typeof DeviceMotionEvent!=='undefined'){window.addEventListener('devicemotion',onMotion);}

// ---- 9. RENDER LOOP ----------------------------------------
function loop(now){
  requestAnimationFrame(loop); const t=now*0.001;
  charms.rotation.y=t*0.05;
  charms.children.forEach(sp=>{const u=sp.userData;sp.position.y=u.by+Math.sin(t*u.spd+u.ph)*u.amp;sp.material.rotation=Math.sin(t*0.5+u.ph)*0.3;});

  let pop=1;
  if(state===S.IDLE){
    orb.position.y=Math.sin(t*1.0)*0.04; orb.rotation.y+=0.0015; orb.rotation.x=Math.sin(t*0.5)*0.03;
    orb.scale.setScalar(1+Math.sin(t*1.5)*0.018);
    idleMat.opacity = asked?0:Math.min(idleMat.opacity+0.04,1);
  }
  else if(state===S.WAKING){
    const p=(now-t0)/WAKE_MS,d=1-p;
    orb.position.x=(Math.random()*2-1)*0.06*d; orb.position.y=(Math.random()*2-1)*0.06*d;
    orb.rotation.x+=spin.x*0.13*d; orb.rotation.y+=spin.y*0.13*d;
    idleMat.opacity=Math.max(idleMat.opacity-0.1,0);
    if(p>=1){orb.rotation.set(0,0,0);orb.position.set(0,0,0);orb.scale.setScalar(1);state=S.REVEAL;t0=now;}
  }
  else if(state===S.REVEAL){
    const p=Math.min((now-t0)/REVEAL_MS,1), e=1-Math.pow(1-p,3);
    drawAnswer(pending, 15*(1-e)); ansMat.opacity=e;
    pop = 1.18 - 0.18*e + (p<0.5?0:Math.sin((p-0.5)*Math.PI)*0.06);   // pop-in overshoot
    orb.position.y=Math.sin(t*1.0)*0.04;
    if(p>=1){state=S.IDLE; hint.textContent='it has spoken \u2665';}
  }
  ansPlane.scale.set(pop,pop,1);
  renderer.render(scene,camera);
}
if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>{drawIdle(); if(pending)drawAnswer(pending,0);});
drawIdle();

// ---- 10. RESPONSIVE ----------------------------------------
function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.position.z=h>w?4.7:4.0;camera.updateProjectionMatrix();}
addEventListener('resize',resize); resize(); requestAnimationFrame(loop);

// ---- 11. PWA SERVICE WORKER --------------------------------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
