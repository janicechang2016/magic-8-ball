<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Generate Magic 8 icons</title>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
<style>
  body{font-family:system-ui;background:#fff2f9;color:#8a0a4f;padding:24px;text-align:center;}
  canvas{margin:12px;border:2px dashed #ff5fa6;border-radius:12px;background:#fff;}
  button{font-size:16px;padding:10px 18px;background:#ff1f8f;color:#fff;border:0;border-radius:999px;cursor:pointer;margin:8px;}
  p{max-width:560px;margin:12px auto;}
</style>
</head>
<body>
  <h1>Magic 8 — icon generator</h1>
  <p>Wait ~1s for the Shrikhand font to load, then click the button. Two PNGs will download: <code>icon-192.png</code> and <code>icon-512.png</code>. Drop them in the <code>icons/</code> folder.</p>
  <div>
    <canvas id="c192" width="192" height="192"></canvas>
    <canvas id="c512" width="512" height="512"></canvas>
  </div>
  <div>
    <button id="dl192">Download icon-192.png</button>
    <button id="dl512">Download icon-512.png</button>
  </div>

<script>
function drawIcon(canvas){
  const s = canvas.width;
  const x = canvas.getContext('2d');
  const cx = s/2, cy = s/2;
  const g = x.createRadialGradient(cx, s*0.35, s*0.04, cx, cy, s*0.6);
  g.addColorStop(0, '#ff8ec6');
  g.addColorStop(1, '#ff1f8f');
  x.fillStyle = g;
  x.beginPath();
  x.arc(cx, cy, s*0.49, 0, Math.PI*2);
  x.fill();
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.font = `400 ${Math.round(s*0.6)}px Shrikhand, cursive`;
  x.lineWidth = Math.round(s*0.05);
  x.strokeStyle = '#fff';
  x.strokeText('8', cx, cy + s*0.06);
  x.fillStyle = '#ffe34d';
  x.fillText('8', cx, cy + s*0.06);
}

function render(){
  drawIcon(document.getElementById('c192'));
  drawIcon(document.getElementById('c512'));
}

function download(canvas, name){
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }, 'image/png');
}

document.getElementById('dl192').addEventListener('click', () => {
  download(document.getElementById('c192'), 'icon-192.png');
});
document.getElementById('dl512').addEventListener('click', () => {
  download(document.getElementById('c512'), 'icon-512.png');
});

// re-render after font load
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(render);
}
render();
</script>
</body>
</html>
